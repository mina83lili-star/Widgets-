<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    /* Transparent background to prevent white edges in Notion Dark Mode */
    background-color: transparent !important;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Times New Roman', Times, serif;
  }

  .widget-button {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 95%; 
    max-width: 450px;
    height: 180px;
    /* Dark Mode Medical Theme */
    background-color: #212121; 
    border: 1px solid #c8a165; /* Gold border from your cover art */
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.3s ease;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }

  .widget-button:hover {
    background-color: #2c2c2c;
    border-color: #f7e6c4;
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.5);
  }

  .label {
    color: #f7e6c4; /* Cream/Gold color */
    font-size: 3rem;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .subtext {
    color: #c8a165; /* Muted Gold accent */
    font-size: 0.9rem;
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 3px;
  }
</style>
</head>
<body>

  <a href="https://www.notion.so/a758e1e6cb8b498a9d52503d9b440b3a?v=8d006429a94944628090f91be078565e&source=copy_link" 
     class="widget-button" 
     target="_blank">
    <span class="label">Today</span>
    <span class="subtext">Daily Rounds</span>
  </a>

</body>
</html>
