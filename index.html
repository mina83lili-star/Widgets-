<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today Widget</title>

<style>

html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
}

/* Main widget */
.widget {
  width: 100vw;
  height: 100vh;
  background: #ddd9d2;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  font-family: Georgia, "Times New Roman", serif;
}

/* Big title area */
.hero {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hero h1 {
  font-size: 90px;
  color: #9b7b00;
  font-weight: bold;
  margin: 0;
}

/* Bottom bar */
.footer {
  background: #f6f5f3;
  padding: 18px 28px;
  font-size: 28px;
  color: #444;
  display: flex;
  align-items: center;
  gap: 10px;
}

</style>
</head>

<body>

<div class="widget">

  <div class="hero">
    <h1>Today</h1>
  </div>

  <div class="footer">
    📅 <span id="today">Today</span>
  </div>

</div>

<script>
const today = new Date();
const options = { weekday:'long', month:'long', day:'numeric' };
document.getElementById("today").innerText =
today.toLocaleDateString("en-US", options);
</script>

</body>
</html>
